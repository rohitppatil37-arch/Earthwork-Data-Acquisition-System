<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard | यांत्रिकी मातीकाम माहिती प्रणाली</title>

<style>

:root{
  --primary:#1e40af;
  --bg:#f3f4f6;
  --card:#ffffff;
  --border:#e5e7eb;
  --danger:#b91c1c;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:"Noto Sans Devanagari",system-ui,sans-serif;
  background:var(--bg);
  padding:15px 20px 40px;
}

/* ================= HEADER ================= */

.gov-header{
  text-align:center;
  margin-bottom:25px;
  padding-bottom:15px;
  border-bottom:3px solid var(--primary);
  background:white;
  border-radius:12px;
  box-shadow:0 6px 18px rgba(0,0,0,0.05);
  padding-top:15px;
}

.gov-logos{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:20px;
  margin-bottom:15px;
}

.center-logo{width:85px;}
.side-logo{width:70px;}

.gov-title{
  font-size:24px;
  font-weight:700;
  color:var(--primary);
}

/* ================= CONTAINER ================= */

.container{
  max-width:750px;
  margin:auto;
  background:var(--card);
  padding:25px;
  border-radius:14px;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

.subdivision-name{
  text-align:center;
  font-size:20px;
  font-weight:700;
  color:var(--primary);
  margin-bottom:20px;
}

/* ================= REPORT CARD ================= */

.report-card{
  margin-top:18px;
  padding:16px;
  border:1px solid var(--border);
  border-radius:10px;
  background:#f9fafb;
}

.report-card label{
  font-weight:600;
  display:block;
  margin-bottom:10px;
}

.period-row{
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

.period-row input{
  flex:1;
  padding:8px;
  border-radius:6px;
  border:1px solid var(--border);
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:var(--primary);
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  opacity:0.9;
}

.logout{
  background:var(--danger);
  margin-top:25px;
}

@media(max-width:600px){

  .period-row{
    flex-direction:column;
  }

  .center-logo{width:75px;}
  .side-logo{width:65px;}
}

</style>
</head>

<body>

<!-- ================= HEADER ================= -->

<div class="gov-header">

<div class="gov-logos">
<img src="left-logo.png" class="side-logo">
<img src="main-logo.png" class="center-logo">
<img src="right-logo.png" class="side-logo">
</div>

<div class="gov-title">
यांत्रिकी मातीकाम माहिती प्रणाली
</div>

</div>

<!-- ================= DASHBOARD ================= -->

<div class="container">

<div class="subdivision-name" id="subdivisionName"></div>

<h3>📊 रिपोर्ट डाउनलोड</h3>


<!-- MACHINE REPORT -->
<div class="report-card">

<label>⚙️ सयंत्राच्या तास / किमी चा अहवाल</label>

<div class="period-row">
<input type="date" id="m_from">
<input type="date" id="m_to">
</div>

<button onclick="downloadReport('machine')">
⬇️ Download
</button>

</div>


<!-- GPS REPORT -->
<div class="report-card">

<label>📡 GPS अहवाल</label>

<div class="period-row">
<input type="date" id="g_from">
<input type="date" id="g_to">
</div>

<button onclick="downloadReport('gps')">
⬇️ Download
</button>

</div>


<!-- ATTENDANCE REPORT -->
<div class="report-card">

<label>👷 हजेरी अहवाल</label>

<div class="period-row">
<input type="date" id="a_from">
<input type="date" id="a_to">
</div>

<button onclick="downloadReport('attendance')">
⬇️ Download
</button>

</div>


<!-- PENDING REPORT -->
<div class="report-card">

<label>💰 प्रलंबित रकमेचा अहवाल</label>

<div class="period-row">
<input type="date" id="p_from">
<input type="date" id="p_to">
</div>

<button onclick="downloadReport('pending')">
⬇️ Download
</button>

</div>


<button class="logout" onclick="logout()">
🚪 Logout
</button>

</div>


<script>

const API_URL = "PASTE_YOUR_APPS_SCRIPT_URL_HERE";


/* ================= PAGE LOAD ================= */

document.addEventListener("DOMContentLoaded", function(){

const token = localStorage.getItem("token");
const subdivisionName = localStorage.getItem("subdivisionName");
const subdivisionCode = localStorage.getItem("subdivisionCode");

if(!token || !subdivisionCode){
  window.location.href = "login.html";
  return;
}

document.getElementById("subdivisionName").innerText =
"उपविभाग : " + subdivisionName;


/* Default period */

const today = new Date().toISOString().split("T")[0];
const startMonth = new Date(new Date().getFullYear(),new Date().getMonth(),1)
.toISOString().split("T")[0];

document.querySelectorAll("input[id$='_from']").forEach(el=>el.value=startMonth);
document.querySelectorAll("input[id$='_to']").forEach(el=>el.value=today);

});


/* ================= REPORT DOWNLOAD ================= */

function downloadReport(type){

const token = localStorage.getItem("token");
const sub = localStorage.getItem("subdivisionCode");

let from,to;

if(type==="machine"){
from=document.getElementById("m_from").value;
to=document.getElementById("m_to").value;
}

if(type==="gps"){
from=document.getElementById("g_from").value;
to=document.getElementById("g_to").value;
}

if(type==="attendance"){
from=document.getElementById("a_from").value;
to=document.getElementById("a_to").value;
}

if(type==="pending"){
from=document.getElementById("p_from").value;
to=document.getElementById("p_to").value;
}

window.open(
API_URL +
"?mode=report"+
"&type="+type+
"&from="+from+
"&to="+to+
"&subdivision="+sub+
"&token="+token,
"_blank"
);

}


/* ================= LOGOUT ================= */

function logout(){

if(confirm("तुम्हाला लॉगआउट करायचे आहे का?")){

localStorage.removeItem("token");
localStorage.removeItem("subdivisionCode");
localStorage.removeItem("subdivisionName");
localStorage.removeItem("role");

window.location.href="login.html";

}

}

</script>

</body>
</html>
